services:
  # ── Web Service (Node.js Express) ──────────────────────────
  - type: web
    name: smme-portal
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:migrate && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smme-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: SMME_ADMIN_PASSWORD
        value: Admin@1234
      - key: ALLOW_DEMO_SEED
        value: "true"
      - key: SMME_DEMO_STAFF_PASSWORD
        value: Staff@1234

databases:
  # ── PostgreSQL Database ─────────────────────────────────────
  - name: smme-db
    plan: free
    databaseName: smme_portal
    user: smme_user
