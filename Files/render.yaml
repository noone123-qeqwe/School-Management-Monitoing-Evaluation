services:
  # ── Web Service (Node.js Express) ──────────────────────────
  - type: web
    name: smme-portal
    runtime: node
    plan: free
    buildCommand: npm install && npm run db:migrate && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: smme-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true

databases:
  # ── PostgreSQL Database ─────────────────────────────────────
  - name: smme-db
    plan: free
    databaseName: smme_portal
    user: smme_user
